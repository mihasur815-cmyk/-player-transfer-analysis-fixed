<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Cover — Трансфери літа 2026 | Tribuna</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
  body { width: 1080px; height: 1080px; overflow: hidden; background: #0a0e17; font-family: 'Inter', Arial Black, sans-serif; }
  .card { width: 1080px; height: 1080px; position: relative; overflow: hidden; background: #0a0e17; }
  .top-bar { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: #F5C518; z-index: 20; }
  .photo { position: absolute; bottom: 0; right: 0; height: 85%; object-fit: contain; object-position: bottom right; z-index: 2; }
  .photo-1 { right: 2%; width: 32%; opacity: 1; }
  .photo-2 { right: 26%; width: 28%; opacity: 0.65; }
  .photo-3 { right: 48%; width: 26%; opacity: 0.4; }
  .grad-left { position: absolute; inset: 0; background: linear-gradient(to right, #0a0e17 35%, rgba(10,14,23,0.85) 52%, rgba(10,14,23,0.2) 72%, transparent 100%); z-index: 5; }
  .grad-bottom { position: absolute; inset: 0; background: linear-gradient(to top, #0a0e17 0%, rgba(10,14,23,0.5) 18%, transparent 45%); z-index: 5; }
  .content { position: absolute; inset: 0; z-index: 10; padding: 80px; display: flex; flex-direction: column; justify-content: space-between; }
  .label { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #F5C518; flex-shrink: 0; }
  .label-text { color: #F5C518; font-size: 13px; font-weight: 700; letter-spacing: 6px; text-transform: uppercase; }
  .title-white { color: #fff; font-size: 96px; font-weight: 900; line-height: 0.9; text-transform: uppercase; }
  .title-yellow { color: #F5C518; font-size: 96px; font-weight: 900; line-height: 0.9; text-transform: uppercase; margin-bottom: 28px; }
  .subtitle { color: rgba(255,255,255,0.4); font-size: 15px; letter-spacing: 4px; text-transform: uppercase; }
  .players-list { display: flex; flex-direction: column; gap: 14px; }
  .player-row { display: flex; align-items: center; gap: 16px; }
  .accent-bar { width: 4px; height: 28px; border-radius: 2px; flex-shrink: 0; }
  .player-name { color: #fff; font-size: 18px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; }
  .player-club { color: rgba(255,255,255,0.3); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; margin-left: 6px; }
  .logo { position: absolute; bottom: 80px; right: 80px; z-index: 15; }
  .logo img { width: 56px; height: 56px; object-fit: contain; opacity: 0.5; }
  .tribuna-badge { position: absolute; top: 28px; right: 80px; z-index: 20; display: flex; align-items: center; gap: 8px; }
  .tribuna-name { color: rgba(255,255,255,0.5); font-size: 13px; letter-spacing: 4px; text-transform: uppercase; font-weight: 700; }
  .tribuna-dot { color: #F5C518; }
</style>
</head>
<body>
<div class="card">
  <div class="top-bar"></div>

  <div class="tribuna-badge">
    <span class="tribuna-name">TRIBUNA<span class="tribuna-dot">.COM</span></span>
  </div>

  <img class="photo photo-3" src="https://resources.premierleague.com/premierleague/photos/players/110x140/p206325.png" alt="Zinchenko">
  <img class="photo photo-2" src="https://resources.premierleague.com/premierleague/photos/players/110x140/p97299.png" alt="Stones">
  <img class="photo photo-1" src="/dovbyk-photo.jpeg" alt="Dovbyk">

  <div class="grad-left"></div>
  <div class="grad-bottom"></div>

  <div class="content">
    <div>
      <div class="label">
        <div class="dot"></div>
        <span class="label-text">Трансферний трекер · Ексклюзив · Літо 2026</span>
      </div>
      <div class="title-white">ТРАНСФЕРИ</div>
      <div class="title-yellow">ЛІТА 2026</div>
      <div class="subtitle">Куди підуть українські зірки?</div>
    </div>

    <div class="players-list">
      <div class="player-row">
        <div class="accent-bar" style="background:#F5C518"></div>
        <span class="player-name">Артем Довбик</span>
        <span class="player-club">· Рома</span>
      </div>
      <div class="player-row">
        <div class="accent-bar" style="background:#60a5fa"></div>
        <span class="player-name">John Stones</span>
        <span class="player-club">· Man City</span>
      </div>
      <div class="player-row">
        <div class="accent-bar" style="background:#f87171"></div>
        <span class="player-name">Олександр Зінченко</span>
        <span class="player-club">· Ajax</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
