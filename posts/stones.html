<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>John Stones — Transfer 2026 | Tribuna</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
  body { width: 1080px; height: 1080px; overflow: hidden; background: #0a0e17; font-family: 'Inter', Arial Black, sans-serif; }
  .card { width: 1080px; height: 1080px; position: relative; overflow: hidden; background: #0a0e17; }
  .top-bar { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: #60a5fa; z-index: 20; }
  .photo { position: absolute; bottom: 0; right: 0; height: 105%; width: 62%; object-fit: contain; object-position: bottom right; z-index: 2; }
  .grad-left { position: absolute; inset: 0; background: linear-gradient(to right, #0a0e17 38%, rgba(10,14,23,0.9) 52%, rgba(10,14,23,0.15) 72%, transparent 100%); z-index: 5; }
  .grad-bottom { position: absolute; inset: 0; background: linear-gradient(to top, #0a0e17 0%, rgba(10,14,23,0.4) 15%, transparent 40%); z-index: 5; }
  .content { position: absolute; inset: 0; z-index: 10; padding: 80px; display: flex; flex-direction: column; justify-content: space-between; max-width: 560px; }
  .label { display: flex; align-items: center; gap: 10px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #60a5fa; flex-shrink: 0; }
  .label-text { color: #60a5fa; font-size: 13px; font-weight: 700; letter-spacing: 6px; text-transform: uppercase; }
  .name-first { color: #fff; font-size: 88px; font-weight: 900; line-height: 0.88; text-transform: uppercase; margin-top: 28px; }
  .name-last { color: #60a5fa; font-size: 88px; font-weight: 900; line-height: 0.88; text-transform: uppercase; margin-bottom: 24px; }
  .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .tag { border: 1px solid; font-size: 11px; padding: 5px 12px; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; }
  .tag-white { border-color: rgba(255,255,255,0.18); color: rgba(255,255,255,0.55); }
  .tag-blue { border-color: rgba(96,165,250,0.4); color: #60a5fa; }
  .divider { width: 40px; height: 2px; background: #60a5fa; margin: 20px 0; }
  .transfer-block { background: rgba(96,165,250,0.06); border: 1px solid rgba(96,165,250,0.25); padding: 20px 24px; margin-bottom: 12px; }
  .transfer-club { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .club-country { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); font-size: 10px; letter-spacing: 2px; padding: 3px 8px; text-transform: uppercase; font-weight: 700; }
  .club-name { color: #fff; font-size: 15px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; }
  .club-status { background: #60a5fa20; border: 1px solid #60a5fa50; color: #60a5fa; font-size: 9px; letter-spacing: 2px; padding: 3px 8px; text-transform: uppercase; font-weight: 700; }
  .club-detail { color: rgba(255,255,255,0.45); font-size: 12px; letter-spacing: 1px; margin-bottom: 12px; }
  .prob-bar-bg { width: 100%; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; }
  .prob-bar-fill { height: 3px; background: #60a5fa; border-radius: 2px; }
  .prob-label { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
  .prob-text { color: rgba(255,255,255,0.3); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
  .prob-num { color: #60a5fa; font-size: 22px; font-weight: 900; }
  .prob-pct { color: #60a5fa; font-size: 13px; font-weight: 700; }
  .club-logo { position: absolute; bottom: 80px; right: 80px; width: 70px; height: 70px; object-fit: contain; opacity: 0.85; z-index: 15; }
  .tribuna-badge { position: absolute; top: 26px; right: 80px; z-index: 20; color: rgba(255,255,255,0.4); font-size: 12px; letter-spacing: 4px; text-transform: uppercase; font-weight: 700; }
  .tribuna-dot { color: #60a5fa; }
</style>
</head>
<body>
<div class="card">
  <div class="top-bar"></div>
  <div class="tribuna-badge">TRIBUNA<span class="tribuna-dot">.COM</span></div>

  <img class="photo" src="https://resources.premierleague.com/premierleague/photos/players/110x140/p97299.png" alt="Stones">
  <div class="grad-left"></div>
  <div class="grad-bottom"></div>
  <img class="club-logo" src="https://upload.wikimedia.org/wikipedia/en/e/eb/Manchester_City_FC_badge.svg" alt="Man City">

  <div class="content">
    <div>
      <div class="label">
        <div class="dot"></div>
        <span class="label-text">Transfer · Summer 2026</span>
      </div>
      <div class="name-first">JOHN</div>
      <div class="name-last">STONES</div>
      <div class="tags">
        <span class="tag tag-white">Центральний захисник</span>
        <span class="tag tag-blue">Man City</span>
        <span class="tag tag-white">31 рік</span>
      </div>
      <div class="divider"></div>
    </div>

    <div>
      <div class="transfer-block">
        <div class="transfer-club">
          <span class="club-country">ENG</span>
          <span class="club-name">MAN CITY</span>
          <span class="club-status">Лідер гонки</span>
        </div>
        <div class="club-detail">Подовження контракту · Переговори тривають — Липень 2026</div>
        <div class="prob-bar-bg"><div class="prob-bar-fill" style="width:55%"></div></div>
        <div class="prob-label">
          <span class="prob-text">Імовірність</span>
          <span><span class="prob-num">55</span><span class="prob-pct">%</span></span>
        </div>
      </div>

      <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);padding:16px 24px;">
        <div class="transfer-club">
          <span class="club-country">ESP</span>
          <span class="club-name">BARCELONA</span>
          <span style="background:#f59e0b20;border:1px solid #f59e0b50;color:#f59e0b;font-size:9px;letter-spacing:2px;padding:3px 8px;text-transform:uppercase;font-weight:700;">Активний інтерес</span>
        </div>
        <div class="prob-bar-bg"><div style="height:3px;background:rgba(255,255,255,0.2);border-radius:2px;width:25%"></div></div>
        <div class="prob-label">
          <span class="prob-text">Імовірність</span>
          <span><span style="color:rgba(255,255,255,0.4);font-size:22px;font-weight:900;">25</span><span style="color:rgba(255,255,255,0.4);font-size:13px;font-weight:700;">%</span></span>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
